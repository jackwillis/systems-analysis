<svg xmlns="http://www.w3.org/2000/svg" width="160" height="140" viewBox="0 0 160 140">
  <!-- Reading glasses resting on an open book, text flowing out as extracted lines -->

  <style>
    .sk { stroke: #2a1a0a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Open book -->
  <!-- Left page -->
  <path d="M 80 36 L 20 42 L 18 114 L 80 108 Z" fill="#f0ead6" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Right page -->
  <path d="M 80 36 L 140 42 L 142 114 L 80 108 Z" fill="#f4f0e4" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Spine -->
  <line x1="80" y1="36" x2="80" y2="108" stroke="#2a1a0a" stroke-width="1.8"/>
  <!-- Book covers (side edges) -->
  <path d="M 20 42 L 14 40 L 12 112 L 18 114" fill="#8b4513" stroke="#2a1a0a" stroke-width="1"/>
  <path d="M 140 42 L 146 40 L 148 112 L 142 114" fill="#8b4513" stroke="#2a1a0a" stroke-width="1"/>
  <!-- Cover thickness -->
  <line x1="12" y1="112" x2="18" y2="114" stroke="#2a1a0a" stroke-width="1.5"/>
  <line x1="148" y1="112" x2="142" y2="114" stroke="#2a1a0a" stroke-width="1.5"/>

  <!-- Text on left page (dense, some visible) -->
  <line x1="28" y1="52" x2="72" y2="50" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="58" x2="72" y2="56" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="64" x2="70" y2="62" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="70" x2="72" y2="68" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="76" x2="68" y2="74" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="82" x2="72" y2="80" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="88" x2="66" y2="86" stroke="#bbb" stroke-width="0.8"/>
  <line x1="28" y1="94" x2="70" y2="92" stroke="#bbb" stroke-width="0.8"/>

  <!-- Text on right page -->
  <line x1="88" y1="50" x2="134" y2="52" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="56" x2="134" y2="58" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="62" x2="132" y2="64" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="68" x2="134" y2="70" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="74" x2="130" y2="76" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="80" x2="134" y2="82" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="86" x2="128" y2="88" stroke="#bbb" stroke-width="0.8"/>
  <line x1="88" y1="92" x2="132" y2="94" stroke="#bbb" stroke-width="0.8"/>

  <!-- "PDF" embossed on cover edge -->
  <text x="14" y="80" font-family="serif" font-size="7" fill="#c0935a" font-weight="bold" transform="rotate(-90 14 80)">PDF</text>

  <!-- Reading glasses resting on the book -->
  <!-- Left lens -->
  <ellipse cx="62" cy="56" rx="14" ry="10" fill="none" stroke="#555" stroke-width="2" transform="rotate(-5 62 56)"/>
  <!-- Right lens -->
  <ellipse cx="100" cy="54" rx="14" ry="10" fill="none" stroke="#555" stroke-width="2" transform="rotate(5 100 54)"/>
  <!-- Bridge -->
  <path d="M 76 54 Q 80 48 86 54" stroke="#555" stroke-width="2" fill="none"/>
  <!-- Arms (folded, resting on pages) -->
  <path d="M 48 56 Q 30 50 22 46" stroke="#555" stroke-width="1.5" fill="none"/>
  <path d="M 114 54 Q 130 48 140 46" stroke="#555" stroke-width="1.5" fill="none"/>

  <!-- Lens reflections -->
  <path d="M 54 50 Q 58 46 64 48" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 94 48 Q 98 44 104 46" stroke="#fff" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Extracted text floating up (the "read" output) -->
  <line x1="56" y1="28" x2="106" y2="28" stroke="#2a1a0a" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="22" x2="100" y2="22" stroke="#2a1a0a" stroke-width="0.8" opacity="0.4"/>
  <line x1="64" y1="16" x2="96" y2="16" stroke="#2a1a0a" stroke-width="0.6" opacity="0.3"/>
  <line x1="68" y1="10" x2="92" y2="10" stroke="#2a1a0a" stroke-width="0.4" opacity="0.2"/>

  <!-- Surface -->
  <line x1="0" y1="120" x2="160" y2="120" stroke="#2a1a0a" stroke-width="1.2"/>
  <rect x="0" y="120" width="160" height="20" fill="#c0935a" opacity="0.12"/>
</svg>
