<svg xmlns="http://www.w3.org/2000/svg" width="160" height="140" viewBox="0 0 160 140">
  <!-- A picture frame hanging on a wall, with one corner unhinged revealing
       a different scene behind it. A sleeping dog beside the frame. -->

  <style>
    .sk { stroke: #2a1a0a; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Wall texture (subtle) -->
  <rect x="0" y="0" width="160" height="140" fill="#f0ead6"/>
  <line x1="0" y1="20" x2="160" y2="20" stroke="#e8e0d0" stroke-width="0.4"/>
  <line x1="0" y1="40" x2="160" y2="40" stroke="#e8e0d0" stroke-width="0.4"/>
  <line x1="0" y1="60" x2="160" y2="60" stroke="#e8e0d0" stroke-width="0.4"/>
  <line x1="0" y1="80" x2="160" y2="80" stroke="#e8e0d0" stroke-width="0.4"/>
  <line x1="0" y1="100" x2="160" y2="100" stroke="#e8e0d0" stroke-width="0.4"/>

  <!-- Nail and wire -->
  <circle cx="80" cy="12" r="2" fill="#888" stroke="#2a1a0a" stroke-width="1"/>
  <path d="M 80 14 L 46 28 M 80 14 L 114 28" stroke="#aaa" stroke-width="0.8" fill="none"/>

  <!-- Hidden scene behind the frame (visible through the unhinged corner) -->
  <!-- Different colored background peeking through -->
  <path d="M 96 28 L 130 28 L 130 62 Z" fill="#c0e8f0"/>
  <!-- Small different objects in the revealed area -->
  <circle cx="118" cy="38" r="4" fill="#e74c3c" opacity="0.5"/>
  <rect x="108" y="44" width="8" height="6" rx="1" fill="#f39c12" opacity="0.5"/>
  <text x="110" y="56" font-family="monospace" font-size="5" fill="#3498db" opacity="0.7">!?</text>

  <!-- Picture frame (slightly tilted, one corner unhinged) -->
  <!-- Frame contents — a "stable" scene: simple landscape -->
  <rect x="30" y="28" width="100" height="72" rx="1" fill="#f8f4e8"/>
  <!-- Simple landscape inside frame -->
  <line x1="30" y1="70" x2="130" y2="70" stroke="#8fbc8f" stroke-width="1"/>
  <circle cx="110" cy="48" r="8" fill="#f4c542" opacity="0.3" stroke="#f4c542" stroke-width="0.8"/>
  <path d="M 50 70 L 60 52 L 70 70" stroke="#6b8e6b" stroke-width="1.2" fill="#8fbc8f" opacity="0.4"/>
  <path d="M 70 70 L 84 46 L 98 70" stroke="#6b8e6b" stroke-width="1.2" fill="#8fbc8f" opacity="0.4"/>
  <!-- Label inside frame -->
  <text x="80" y="90" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa">assumed stable</text>

  <!-- Frame border -->
  <rect x="30" y="28" width="100" height="72" rx="2" fill="none" stroke="#5a3a1a" stroke-width="3"/>

  <!-- Unhinged corner (top-right, peeling away) -->
  <path d="M 130 28 L 130 62 L 96 28 Z" fill="#f0ead6" stroke="#5a3a1a" stroke-width="2"/>
  <!-- Curl shadow -->
  <path d="M 130 62 L 126 56" stroke="#ccc" stroke-width="0.5" fill="none"/>

  <!-- Broken hinge mark -->
  <circle cx="130" cy="28" r="3" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="128" y1="26" x2="132" y2="30" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Sleeping dog (Fodor's sleeping dogs) -->
  <!-- Body -->
  <ellipse cx="34" cy="124" rx="18" ry="8" fill="#c4a67a" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Head -->
  <ellipse cx="18" cy="118" rx="10" ry="7" fill="#c4a67a" stroke="#2a1a0a" stroke-width="1.2"/>
  <!-- Ear -->
  <ellipse cx="12" cy="114" rx="4" ry="5" fill="#a8875a" stroke="#2a1a0a" stroke-width="1"/>
  <!-- Closed eye -->
  <path d="M 20 116 Q 22 115 24 116" stroke="#2a1a0a" stroke-width="1" fill="none"/>
  <!-- Nose -->
  <circle cx="14" cy="120" r="1.5" fill="#2a1a0a"/>
  <!-- Tail -->
  <path d="M 52 122 Q 58 116 56 124" stroke="#c4a67a" stroke-width="2" fill="none"/>
  <!-- Zzz -->
  <text x="28" y="110" font-family="serif" font-size="7" fill="#888" font-style="italic">z</text>
  <text x="34" y="106" font-family="serif" font-size="9" fill="#888" font-style="italic">z</text>
  <text x="42" y="100" font-family="serif" font-size="11" fill="#888" font-style="italic">z</text>

  <!-- Question marks floating around (what changed?) -->
  <text x="136" y="78" font-family="serif" font-size="14" fill="#c0392b" opacity="0.6" font-weight="bold">?</text>
  <text x="144" y="50" font-family="serif" font-size="10" fill="#c0392b" opacity="0.4" font-weight="bold">?</text>

  <!-- Ground line -->
  <line x1="0" y1="132" x2="160" y2="132" stroke="#2a1a0a" stroke-width="1" stroke-dasharray="3,5"/>
</svg>
